name: Update README

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */1 * * *"
  workflow_dispatch:

jobs:
  markscribe:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN }}

      - uses: cboone/gh-actions/actions/run-markscribe@v2.1.3
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_GITHUB_TOKEN }}
        with:
          template: templates/README.md.tpl
          write-to: README.md

      - name: Commit and push
        run: |
          git config user.name "Christopher Boone"
          git config user.email "cboone@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "docs: update generated README"
          git push
